apiVersion: v1
kind: Pod
metadata:
  name: pod-config-individual
spec:
  containers:
    - name: nginx
      image: nginx
      env:
        - name: course
          valueFrom:
            configMapKeyRef:
              name: daws78s
              key: course
        - name: trainer
          valueFrom:
            configMapKeyRef:
              name: daws78s
              key: trainer
        - name: github-link
          valueFrom:
            configMapKeyRef:
              name: daws78s
              key: github

# kubectl apply -f 08b-pod-config.yaml
# kubectl get pod-config-individual
# kubectl describe pod pod-config-individual