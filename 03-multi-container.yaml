kind: Pod
apiVersion: v1
metadata:
  name: multi-container
spec:
  containers:
  - name: nginx
    image: nginx
  - name: alma
    image: "almalinux:9"
    command: ["sleep"," 2000" ]

  #We will test using curl localhost in both containers.
